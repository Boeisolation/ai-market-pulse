name: Intraday Alert Check

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * 1-5"

permissions:
  contents: read

jobs:
  alert-check:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_INTRADAY_ALERTS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/cache@v4
        with:
          path: data/alert-state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-
      - run: pip install -e .
      - name: Check threshold events
        env:
          MARKET_PULSE_WEBHOOK_URL: ${{ secrets.MARKET_PULSE_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: market-pulse alert-check --config watchlist.yaml --state data/alert-state.json
