name: Publish Market Pulse Site

on:
  workflow_dispatch:
  schedule:
    - cron: "45 12 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Restore history cache
        uses: actions/cache@v4
        with:
          path: data/history.jsonl
          key: market-pulse-history-v1-${{ github.run_id }}
          restore-keys: |
            market-pulse-history-v1-
      - name: Generate report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: market-pulse run --config examples/watchlist.yaml --output reports --no-notify
      - name: Generate dashboard
        run: market-pulse dashboard --history data/history.jsonl --output reports/dashboard.html
      - name: Build static site
        run: market-pulse site --reports reports --output site --title "AI Market Pulse"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
