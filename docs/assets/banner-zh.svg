<svg viewBox="0 0 1200 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Market Pulse">
  <rect x="0" y="0" width="1200" height="240" rx="18" fill="#14181A"/>

  <!-- quiet sparkline motif on the right, echoing the dashboard's history chart -->
  <polyline points="640,150 700,140 745,155 800,120 850,132 905,95 955,108 1010,80 1065,92 1120,60"
            fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <circle cx="1120" cy="60" r="5" fill="#14B8A6"/>

  <!-- icon lockup: two accent squares + AI badge, matching the product's own header -->
  <rect x="64" y="70" width="20" height="20" rx="4" fill="#16A34A"/>
  <rect x="90" y="70" width="20" height="20" rx="4" fill="#D97706"/>
  <rect x="118" y="66" width="42" height="28" rx="6" fill="#0F766E"/>
  <text x="139" y="86" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#F5F7F6" text-anchor="middle">AI</text>

  <text x="64" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#F5F7F6">Market Pulse</text>
  <text x="64" y="180" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="21" fill="#9BA6A1">把任何一份自选股清单，变成每天的 AI 市场研究报告</text>
  <text x="64" y="207" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#5B6B66">量化研究驾驶舱，还是零代码日报工具——同一个工具，两种打开方式</text>
</svg>
